<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stadium View Sweetie</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <style>
        /* Define our cute color palette */
        :root {
            --bg-color: #FFF5F2; /* Softest Cream Peach */
            --container-bg: #FFFFFF; /* Bright White for focus */
            --accent-pink: #FFB3C6; /* Soft Rose Pink */
            --accent-peach: #FFD2B8; /* Warm Peach */
            --button-text: #603F3F; /* Deep Cocoa Brown for contrast */
            --text-main: #6B4E4E; /* Gentle Brown for main text */
        }

        body { 
            font-family: 'Quicksand', sans-serif; 
            text-align: center; 
            padding: 20px; 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh; /* Centers vertically */
        }

        .container { 
            background: var(--container-bg); 
            padding: 40px 30px; 
            border-radius: 25px; /* Super rounded corners */
            display: inline-block; 
            width: 90%;
            max-width: 500px;
            box-shadow: 0 8px 30px rgba(255, 179, 198, 0.15); /* Soft pink shadow */
            border: 2px solid #FFEBE5;
        }

        h1 {
            color: #FF8BA7; /* Deepest Pink for title */
            font-weight: 700;
            margin-bottom: 30px;
            font-size: 2em;
        }

        /* Styling the Input Area */
        .input-group {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 25px;
            flex-wrap: wrap; /* Good for small screens */
        }

        input { 
            padding: 15px; 
            width: 70px; 
            border: 2px solid #FFE0D9; /* Soft peach border */
            border-radius: 12px; 
            background: #FFFAF8; 
            color: var(--text-main); 
            font-family: 'Quicksand', sans-serif;
            font-size: 1.1em;
            transition: 0.3s;
        }

        input:focus {
            outline: none;
            border-color: var(--accent-pink);
            box-shadow: 0 0 5px rgba(255, 179, 198, 0.5);
        }

        /* The Button */
        button { 
            padding: 15px 35px; 
            background: var(--accent-pink); /* Start Pink */
            border: none; 
            font-weight: 700; 
            cursor: pointer; 
            border-radius: 50px; /* Pillow-shaped */
            color: var(--button-text); 
            transition: all 0.3s ease; 
            font-size: 1.2em;
            box-shadow: 0 4px 10px rgba(255, 179, 198, 0.3);
            text-shadow: 0 1px 1px rgba(255,255,255,0.4);
        }

        button:hover { 
            background: var(--accent-peach); /* Hover turns it Peach */
            transform: translateY(-3px); /* Cute hover lift */
            box-shadow: 0 6px 15px rgba(255, 210, 184, 0.5);
        }

        /* The Image Area */
        #resultArea {
            margin-top: 30px;
        }

        #viewImage { 
            width: 100%; 
            max-width: 600px; 
            border-radius: 20px; /* Rounded image corners */
            display: none; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.1); /* Subtle shadow for the image */
            border: 5px solid white; /* Polaroid-style border */
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Twice Boston N1 Fan Project</h1>
    
    <div class="input-group">
        <input type="text" id="sec" placeholder="Sec">
        <input type="text" id="row" placeholder="Row">
        <input type="text" id="seat" placeholder="Seat">
    </div>

    <button onclick="findSeat()">Color Finder </button>

    <div id="resultArea">
        <img id="viewImage" src="" alt="Seat View">
    </div>
</div>

<script>
    async function findSeat() {
        // !!! DON'T FORGET !!! REPLACE THIS with your Apps Script Web App URL
        const scriptUrl = "https://script.google.com/macros/s/AKfycbyWmc9rdiYP-u2TL7n9SUnKjOujwE3lgWv02Ahdw9kreB11vistpgNS_pCsgPOWrNWaVg/exec";
        
        const sec = document.getElementById('sec').value;
        const row = document.getElementById('row').value;
        const seat = document.getElementById('seat').value;
        const imgElement = document.getElementById('viewImage');

        try {
            const response = await fetch(`${scriptUrl}?section=${sec}&row=${row}&seat=${seat}`);
            const data = await response.json();

            // Just update the image source and show it. No messages.
            imgElement.src = data.url;
            imgElement.style.display = "block";
            
        } catch (error) {
            console.error("Connection error:", error);
            alert("Oops! Couldn't find the database. Please try again later.");
        }
    }
</script>

</body>
</html>
